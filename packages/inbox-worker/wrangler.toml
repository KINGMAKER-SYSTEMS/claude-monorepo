name = "dev-feature-request-inbox"
main = "src/index.ts"
compatibility_date = "2026-01-01"

# Create with: npx wrangler kv namespace create INBOX
# Then paste the returned id below.
[[kv_namespaces]]
binding = "INBOX"
id = "REPLACE_WITH_KV_ID"

# Secrets (set via `npx wrangler secret put <NAME>`):
#   SUBMIT_TOKEN  — shared token coworkers' agents use to submit and fetch instructions
#   ADMIN_TOKEN   — token for listing/resolving/editing the repo list (your side only)
